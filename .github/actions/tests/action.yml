name: "Tests"
description: "Run Go tests for the MCP server"

runs:
  using: "composite"
  steps:
    - name: Setup Go
      uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version: '1.26'
        cache: true

    - name: Setup Task
      uses: arduino/setup-task@v2
      with:
        version: 3.x
        repo-token: ${{ github.token }}

    - name: gofmt -d
      shell: bash
      run: |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "gofmt found unformatted files:"
          echo "$unformatted"
          gofmt -d .
          exit 1
        fi

    - name: vet
      shell: bash
      run: task vet

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest

    - name: govulncheck
      shell: bash
      run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

    - name: test (race + coverage)
      shell: bash
      run: task test-race

    - name: build
      shell: bash
      run: task build
